name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ha_ems/app/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest

  addon-lint:
    name: Home Assistant add-on lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint add-on
        uses: frenck/action-addon-linter@v2
        with:
          path: "./ha_ems"
