name: "Home Energy Management System"
description: "Solar, battery and EV charging optimizer with built-in dashboard"
version: "0.4.3"
slug: ha_ems
url: "https://github.com/glienart/ha_ems"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7

homeassistant_api: true

ingress: true
ingress_port: 8099
panel_icon: mdi:solar-power-variant
panel_title: "EMS"

map:
  - data:rw

options:
  epex_token: ""
  epex_zone: "BE"

schema:
  epex_token: str?
  epex_zone: list(BE|FR|DE-LU|NL|AT|CH|ES|PT|IT-N|DK1|DK2|SE3|NO2|FI|PL|CZ)?
